name: agri_app
description: KisanMitra - AI-powered agricultural companion for Indian farmers.
publish_to: 'none'
version: 2.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'   # ✅ FIXED (recommended for your setup)

dependencies:
  flutter:
    sdk: flutter

  # Networking
  http: ^1.2.1

  # Firebase
  firebase_core: ^3.3.0
  firebase_database: ^11.1.3
  cloud_firestore: ^5.2.1
  firebase_auth: ^5.1.4

  # AI - Gemini
  google_generative_ai: ^0.4.3

  # Voice Input
  speech_to_text: ^6.6.2

  # Voice Output
  flutter_tts: ^4.0.2

  # Location
  geolocator: ^10.1.0
  geocoding: ^2.1.0

  # Local Storage
  shared_preferences: ^2.2.3

  # Utilities
  cupertino_icons: ^1.0.8
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

